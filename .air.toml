# .air.toml — live reload for the Go server in dev (https://github.com/air-verse/air).
# Used by `task dev`, which runs it alongside the Vite dev server.

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/myapp ./cmd/server"
  bin = "./tmp/myapp"
  full_bin = ""
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = [
    "tmp",
    "bin",
    "web/node_modules",
    "web/build",
    "internal/server/spa_dist",
    "deploy",
  ]
  exclude_regex = ["_test\\.go"]
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = 2000

[log]
  time = true

[misc]
  clean_on_exit = true
