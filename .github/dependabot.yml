version: 2
updates:

  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      go-auth:
        patterns:
          - "github.com/coreos/*"
          - "golang.org/x/oauth2"
      go-database:
        patterns:
          - "github.com/jackc/*"
          - "github.com/pressly/goose/*"
      go-misc:
        patterns:
          - "*"

  # npm (SvelteKit SPA)
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    groups:
      svelte:
        patterns:
          - "svelte"
          - "svelte-*"
          - "@sveltejs/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "tailwind-*"
          - "@tailwindcss/*"
      vite:
        patterns:
          - "vite"
          - "@types/*"
      testing:
        patterns:
          - "vitest"
          - "@testing-library/*"
          - "jsdom"
      linting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "prettier"
          - "prettier-*"
          - "globals"
          - "svelte-eslint-parser"
      typescript:
        patterns:
          - "typescript"
          - "typescript-eslint"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - "*"

  # Docker images (docker-compose.yml)
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-images:
        patterns:
          - "*"
